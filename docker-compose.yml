version: '3.8'

services:
  # 后端服务
  backend:
    build: ./backend
    image: etf-backend:latest
    container_name: etf-backend
    volumes:
      - ./backend/.env:/app/.env:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  # 前端服务
  frontend:
    build: ./frontend
    image: etf-frontend:latest
    container_name: etf-frontend
    depends_on:
      - backend
    ports:
      - "8123:80"
    restart: unless-stopped
